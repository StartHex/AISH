name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build:
    name: "Build (${{ matrix.target }})"
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build (release)
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            --bin aish \
            --bin aish-tui \
            --bin aishd

      - name: Prepare artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/aish dist/
          cp target/${{ matrix.target }}/release/aish-tui dist/
          cp target/${{ matrix.target }}/release/aishd dist/

      - name: Prepare artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\aish.exe dist\
          copy target\${{ matrix.target }}\release\aish-tui.exe dist\
          copy target\${{ matrix.target }}\release\aishd.exe dist\

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          tar czf ../aish-${{ matrix.target }}.tar.gz *

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          7z a ../aish-${{ matrix.target }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: aish-${{ matrix.target }}
          path: |
            aish-${{ matrix.target }}.tar.gz
            aish-${{ matrix.target }}.zip

  release:
    name: "GitHub Release"
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AISH ${{ github.ref_name }}"
          generate_release_notes: true
          make_latest: true
          files: |
            artifacts/**/aish-*.tar.gz
            artifacts/**/aish-*.zip
